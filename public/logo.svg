<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" fill="none" role="img" aria-label="V·Living — Fractional Ownership">
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.18" stop-color="#e9ecf1"/>
      <stop offset="0.42" stop-color="#aeb4bd"/>
      <stop offset="0.52" stop-color="#7d828b"/>
      <stop offset="0.6" stop-color="#9aa0a9"/>
      <stop offset="0.8" stop-color="#e3e6ea"/>
      <stop offset="1" stop-color="#b9bdc4"/>
    </linearGradient>
    <linearGradient id="chrome2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f6f8"/>
      <stop offset="0.5" stop-color="#c2c7ce"/>
      <stop offset="0.5" stop-color="#868b93"/>
      <stop offset="1" stop-color="#d6d9de"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ff4ff"/>
      <stop offset="1" stop-color="#00c2d6"/>
    </linearGradient>
    <filter id="cyanGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- cyan swoosh under the V -->
  <path d="M16 74 C 40 92, 78 92, 96 70" stroke="url(#cyan)" stroke-width="4.5" stroke-linecap="round" fill="none" filter="url(#cyanGlow)" opacity="0.95"/>

  <!-- chrome V -->
  <path d="M10 18 L34 18 L52 58 L70 18 L94 18 L62 80 L42 80 Z" fill="url(#chrome)" stroke="#f2f4f7" stroke-width="0.6"/>
  <!-- inner bevel highlight on V -->
  <path d="M18 24 L30 24 L52 70 L48 70 Z" fill="#ffffff" opacity="0.18"/>

  <!-- chrome ring -->
  <circle cx="118" cy="40" r="15" stroke="url(#chrome2)" stroke-width="4" fill="none"/>
  <circle cx="118" cy="40" r="15" stroke="#ffffff" stroke-width="0.7" fill="none" opacity="0.4"/>

  <!-- divider -->
  <rect x="146" y="22" width="2.4" height="40" rx="1" fill="url(#chrome2)" opacity="0.85"/>

  <!-- Living wordmark -->
  <text x="160" y="52" font-family="'Hanken Grotesk','Archivo','Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="600" letter-spacing="0.5" fill="url(#chrome)">Living</text>

  <!-- lockup -->
  <text x="161" y="72" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="9.5" font-weight="700" letter-spacing="6" fill="#9aa1ab">FRACTIONAL OWNERSHIP</text>
</svg>
